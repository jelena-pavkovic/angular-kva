<div class="banner"></div>
<div class="wrapper">
    <div class="search-section">
        <mat-form-field>
            <mat-label>Naziv igračke</mat-label>
            <input matInput [(ngModel)]="filters.name" (input)="applyFilters()">
        </mat-form-field>

        <mat-form-field>
            <mat-label>Tip</mat-label>
            <mat-select [(ngModel)]="filters.typeId" (selectionChange)="applyFilters()">
                <mat-option [value]="null">Svi tipovi</mat-option>
                @for (t of types; track t.typeId) {
                <mat-option [value]="t.typeId">{{ t.name }}</mat-option>
                }
            </mat-select>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Uzrast</mat-label>
            <mat-select [(ngModel)]="filters.ageGroupId" (selectionChange)="applyFilters()">
                <mat-option [value]="null">Svi uzrasti</mat-option>
                @for (a of ageGroups; track a.ageGroupId) {
                <mat-option [value]="a.ageGroupId">{{ a.name }}</mat-option>
                }
            </mat-select>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Ciljna grupa</mat-label>
            <mat-select [(ngModel)]="filters.target" (selectionChange)="applyFilters()">
                <mat-option value="">Sve</mat-option>
                <mat-option value="svi">Svi</mat-option>
                <mat-option value="dečak">Dečak</mat-option>
                <mat-option value="devojčica">Devojčica</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Maksimalna cena</mat-label>
            <input matInput type="number" [(ngModel)]="filters.maxPrice" (input)="applyFilters()">
        </mat-form-field>
    </div>

    <div class="toy-grid">
        @for (item of filteredToys; track item.toyId) {
        <app-toy-card [toy]="item" (onReserve)="handleReservation($event)"></app-toy-card>
        } @empty {
        <p>Učitavanje igračaka...</p>
        }
    </div>
</div>
