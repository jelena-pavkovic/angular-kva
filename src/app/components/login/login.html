<div class="auth-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Prijava</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form (submit)="onLogin()">
                <mat-form-field appearance="fill">
                    <mat-label>Email</mat-label>
                    <input matInput [(ngModel)]="email" name="email" type="email" required>
                </mat-form-field>
            
                <mat-form-field appearance="fill">
                    <mat-label>Lozinka</mat-label>
                    <input matInput [(ngModel)]="password" name="password" type="password" required>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit">Uloguj se</button>
            </form>
            <p>Nemaš nalog? <a routerLink="/register">Registruj se</a></p>
        </mat-card-content>
    </mat-card>
</div>
