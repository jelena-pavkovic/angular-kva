<div class="auth-wrapper">
    <mat-card class="register-card">
        <mat-card-header>
            <mat-card-title>Kreirajte nalog</mat-card-title>
            <mat-card-subtitle>Unesite svoje podatke za pristup prodavnici</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form (submit)="onRegister()" #registerForm="ngForm">

                <div class="form-row">
                    <mat-form-field appearance="outline">
                        <mat-label>Ime</mat-label>
                        <input matInput [(ngModel)]="userData.firstName" name="firstName" required>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Prezime</mat-label>
                        <input matInput [(ngModel)]="userData.lastName" name="lastName" required>
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Korisničko ime</mat-label>
                    <input matInput [(ngModel)]="userData.username" name="username" required>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email adresa</mat-label>
                    <input matInput type="email" [(ngModel)]="userData.email" name="email" required>
                </mat-form-field>

                <div class="form-row">
                    <mat-form-field appearance="outline">
                        <mat-label>Telefon</mat-label>
                        <input matInput [(ngModel)]="userData.phone" name="phone">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Adresa</mat-label>
                        <input matInput [(ngModel)]="userData.address" name="address">
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Omiljene vrste igračaka</mat-label>
                    <mat-select [(ngModel)]="userData.favoriteToyTypes" name="favoriteToyTypes" multiple>
                        @for (type of availableTypes; track type) {
                        <mat-option [value]="type">{{type}}</mat-option>
                        }
                    </mat-select>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Lozinka</mat-label>
                    <input matInput type="password" [(ngModel)]="userData.password" name="password" required>
                </mat-form-field>

                <div class="actions">
                    <button mat-raised-button color="primary" type="submit" [disabled]="!registerForm.form.valid">
                        Registruj se
                    </button>
                    <p>Već imate nalog? <a routerLink="/login">Prijavite se</a></p>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
